<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>friiswitchgaems</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f9f9f9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  #captcha-container {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #fff; border: 1px solid #d3d3d3; border-radius: 3px;
    width: 350px; padding: 15px; box-shadow: 0 0 4px rgba(0,0,0,0.1); z-index: 100; display: flex; flex-direction: column; align-items: center;
  }

  #checkbox-box { display: flex; align-items: center; width: 100%; justify-content: space-between; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; border-radius: 3px; cursor: pointer; }
  #checkbox-box:hover { border-color: #b0b0b0; }
  #custom-check { width: 24px; height: 24px; border: 2px solid #c1c1c1; background: #fff; border-radius: 2px; position: relative; margin-right: 15px; }
  .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4285f4; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; margin: auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  #question-box { display: none; flex-direction: column; align-items: center; text-align: center; }
  #favorite-input { padding: 8px; width: 80%; margin-top: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; }
  #submit-btn { padding: 8px 16px; background-color: #4285f4; color: white; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; }

  #progress-wrapper { display: none; margin-top: 15px; width: 100%; }
  #progress-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
  #progress-fill { background: #4285f4; height: 100%; width: 0%; transition: width 0.1s linear; }
  #status-text { font-size: 12px; color: #777; margin-top: 8px; font-style: italic; text-align: center; }
  
  #pre-roll-vid { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 1000; }
  
  #rick-grid { 
    display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; 
    z-index: 1001; flex-wrap: wrap; overflow: hidden; align-content: flex-start; 
  }
  .rick-gif { width: 11.11vw; height: 12.5vh; object-fit: cover; display: block; }
</style>
</head>
<body>

<div id="captcha-container">
  <div id="checkbox-box" onclick="fakeVerify()">
    <div style="display: flex; align-items: center;">
      <div id="custom-check"><div class="spinner" id="loader"></div></div>
      <span style="font-size: 14px;">I'm not a robot</span>
    </div>
    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="30" alt="reCAPTCHA">
  </div>

  <div id="question-box">
    <p style="margin:0; font-size: 14px;"><b>Verification Successful!</b><br>Type the Nintendo Switch game and region:</p>
    <input type="text" id="favorite-input" placeholder="e.g., Super Mario Odyssey, USA" />
    <button id="submit-btn" onclick="startVerification()">Search Game</button>
  </div>
  
  <div id="progress-wrapper">
    <div id="progress-bg"><div id="progress-fill"></div></div>
    <p id="status-text">Searching servers...</p>
  </div>
</div>

<video id="pre-roll-vid"><source src="202603151152.mp4" type="video/mp4" /></video>
<div id="rick-grid"></div>
<audio id="rick-audio" loop><source src="rickroll.mp3" type="audio/mpeg" /></audio>

<script>
  let prankStarted = false;
  const gifUrl = "https://media1.tenor.com/m/x8v1oNUOmg4AAAAd/rickroll-roll.gif";

  for (let i = 0; i < 72; i++) {
    const img = document.createElement('img');
    img.src = gifUrl;
    img.className = 'rick-gif';
    document.getElementById('rick-grid').appendChild(img);
  }

  function fakeVerify() {
    const audio = document.getElementById('rick-audio');
    audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});

    document.getElementById('loader').style.display = 'block';
    document.getElementById('custom-check').style.borderColor = 'transparent';

    setTimeout(() => {
      document.getElementById('checkbox-box').style.display = 'none';
      document.getElementById('question-box').style.display = 'flex';
    }, 1500);
  }

  function startVerification() {
    const val = document.getElementById('favorite-input').value;
    if (prankStarted || val.trim() === "") return;
    
    document.getElementById('question-box').style.display = 'none';
    document.getElementById('progress-wrapper').style.display = 'block';
    startLoading();
  }

  function startLoading() {
    prankStarted = true;
    let percent = 0;
    const fill = document.getElementById('progress-fill');
    const status = document.getElementById('status-text');

    const interval = setInterval(() => {
      percent++;
      fill.style.width = percent + "%";
      status.innerText = "Searching database... " + percent + "%";

      if (percent === 99) {
        clearInterval(interval);
        status.innerText = "Finalizing secure connection (99%)...";
       
        setTimeout(() => {
           percent = 100;
           fill.style.width = "100%";
           runSequencer(status);
        }, 10000); 
      }
    }, 50); 
  }

  function runSequencer(status) {
    setTimeout(() => {
      status.style.color = "red";
      status.innerText = "Fatal Error: Connection unstable. Troubleshooting...";
      setTimeout(() => {
        status.style.color = "blue";
        status.innerText = "The site is eating a sandwich, please wait...";
        setTimeout(() => {
          status.style.color = "green";
          status.innerText = "Found a helper! Connecting you to Dr. Evil...";
          setTimeout(() => {
            const preRoll = document.getElementById('pre-roll-vid');
            document.getElementById('captcha-container').style.display='none';
            preRoll.style.display='block';
            preRoll.play().catch(() => { triggerFinalRick(); });
            preRoll.onended = triggerFinalRick;
          }, 1500);
        }, 2000);
      }, 2000);
    }, 1000);
  }

  function triggerFinalRick() {
    document.getElementById('pre-roll-vid').style.display='none';
    document.getElementById('rick-grid').style.display='flex';
    document.getElementById('rick-audio').play();
  }
</script>
</body>
</html>
