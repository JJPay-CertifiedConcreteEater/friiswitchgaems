<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>friiswitchgaems</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f9f9f9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  #captcha-container {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #fff; border: 1px solid #d3d3d3; border-radius: 3px;
    width: 350px; padding: 15px; box-shadow: 0 0 4px rgba(0,0,0,0.1); z-index: 100; display: flex; flex-direction: column; align-items: center; cursor: pointer;
  }

  #question-box {
    display: flex; flex-direction: column; align-items: center;
  }

  #favorite-input {
    padding: 8px; width: 80%; margin-top: 10px; margin-bottom: 10px; font-size: 14px;
  }

  #submit-btn {
    padding: 8px 16px; background-color: #4285f4; color: white; border: none; border-radius: 2px; cursor: pointer; font-weight: bold;
  }

  #progress-wrapper { display: none; margin-top: 15px; width: 100%; }
  #progress-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
  #progress-fill { background: #4285f4; height: 100%; width: 0%; transition: width 0.1s linear; }
  #status-text { font-size: 12px; color: #777; margin-top: 8px; font-style: italic; }
  
  #pre-roll-vid { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 1000; }
  
  #rick-grid { 
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background: black; 
    z-index: 1000; 
    flex-wrap: wrap; 
    overflow: hidden; 
    align-content: flex-start; 
    display: flex; 
  }

  .rick-gif { 
    width: 11.11vw; 
    height: 12.5vh; 
    object-fit: cover; 
    display: block;
  }
</style>
</head>
<body>

<div id="captcha-container">
  <div id="question-box">
    <p style="margin:0;">Type the name of the Nintendo Switch game you would like as well as your region. We will scan our site and directly download it!:</p>
    <input type="text" id="favorite-input" placeholder="e.g., Super Mario Odyssey, USA" />
    <button id="submit-btn" onclick="startVerification()">Search Game</button>
  </div>
  <div id="progress-wrapper">
    <div id="progress-bg"><div id="progress-fill"></div></div>
    <p id="status-text">Searching... please wait...</p>
  </div>
</div>

<video id="pre-roll-vid">
  <source src="202603151152.mp4" type="video/mp4" />
</video>

<div id="rick-grid"></div>

<audio id="rick-audio" loop>
  <source src="rickroll.mp3" type="audio/mpeg" />
</audio>

<script>
  let prankStarted = false;

  const grid = document.getElementById('rick-grid');
  const gifUrl = "https://media1.tenor.com/m/x8v1oNUOmg4AAAAd/rickroll-roll.gif";

  for (let i = 0; i < 72; i++) {
    const img = document.createElement('img');
    img.src = gifUrl;
    img.className = 'rick-gif';
    grid.appendChild(img);
  }

  function startVerification() {
    if (prankStarted) return;
    document.getElementById('question-box').style.display = 'none';
    startLoading();
  }

  function startLoading() {
    prankStarted = true;
    document.getElementById('progress-wrapper').style.display = 'block';

    let percent = 0;
    const fill = document.getElementById('progress-fill');
    const status = document.getElementById('status-text');

    const interval = setInterval(() => {
      percent++;
      fill.style.width = percent + "%";
      status.innerText = "Verifying... " + percent + "%";

      if (percent === 99) {
        clearInterval(interval);
        runSequencer(status);
      }
    }, 40);
  }

  function runSequencer(status) {
    setTimeout(() => {
      status.style.color = "red";
      status.innerText = "Verification failed! Sending to troubleshooting...";
      
      setTimeout(() => {
        status.style.color = "blue";
        status.innerText = "The site is eating a sandwich, please wait until it finishes... it's yummy too.";
        
        setTimeout(() => {
          status.style.color = "green";
          status.innerText = "Getting someone to help you... Success!";
          
          setTimeout(() => {
            status.innerText = "Connecting you with Dr. Evil...";
            setTimeout(() => {
              const preRoll = document.getElementById('pre-roll-vid');
              document.getElementById('captcha-container').style.display='none';
              preRoll.style.display='block';
              preRoll.play().catch(() => { triggerFinalRick(); });
              preRoll.onended = triggerFinalRick;
            }, 1500);
          }, 1500);
        }, 3000);
      }, 2000);
    }, 1000);
  }

  function triggerFinalRick() {
    document.getElementById('pre-roll-vid').style.display='none';
    document.getElementById('rick-grid').style.display='flex';
    document.getElementById('rick-audio').play();
  }
</script>
</body>
</html>
