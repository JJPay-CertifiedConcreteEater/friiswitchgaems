<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>friiswitchgaems!</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f9f9f9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        #captcha-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 1px solid #d3d3d3; border-radius: 3px;
            width: 350px; min-height: 74px; display: flex; flex-direction: column; justify-content: center; padding: 15px;
            box-shadow: 0 0 4px rgba(0,0,0,0.1); z-index: 1000; cursor: pointer;
        }

        .row { display: flex; align-items: center; width: 100%; }

        #checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; border-radius: 2px; margin-right: 15px; background: #fff; flex-shrink: 0; }
        #label { color: #555; font-size: 14px; flex-grow: 1; user-select: none; }
   
        #progress-wrapper { display: none; width: 100%; margin-top: 15px; }
        #progress-bg { background: #eee; height: 12px; border-radius: 6px; width: 100%; overflow: hidden; }
        #progress-fill { background: #4285f4; height: 100%; width: 0%; transition: width 0.1s linear; }
        #status-text { font-size: 12px; color: #777; margin-top: 8px; font-style: italic; }

        #rick-grid { display: none; flex-wrap: wrap; height: 100vh; width: 100vw; background: black; position: fixed; top: 0; left: 0; }
        img { width: calc(100vw / 9); height: calc(100vh / 8); object-fit: cover; }
    </style>
</head>
<body>

    <div id="captcha-container" onclick="startPrank()">
        <div class="row" id="main-row">
            <div id="checkbox"></div>
            <div id="label">I'm not a robot</div>
        </div>
        
        <div id="progress-wrapper">
            <div id="progress-bg">
                <div id="progress-fill"></div>
            </div>
            <p id="status-text">Initializing...</p>
        </div>
    </div>

    <div id="rick-grid">
        <script>
            const gifUrl = "https://media1.tenor.com/m/x8v1oNUOmg4AAAAd/rickroll-roll.gif";
            for (let i = 0; i < 72; i++) {
                document.write(`<img src="${gifUrl}">`);
            }
        </script>
    </div>

    <audio id="rick-audio" loop>
        <source src="rickroll.mp3" type="audio/mpeg">
    </audio>

    <script>
        let prankStarted = false;

        function startPrank() {
            if (prankStarted) return; 
            prankStarted = true;

            const checkbox = document.getElementById('checkbox');
            const progressWrapper = document.getElementById('progress-wrapper');
            const fill = document.getElementById('progress-fill');
            const status = document.getElementById('status-text');

            checkbox.style.background = "url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Approve_icon.svg/480px-Approve_icon.svg.png') no-repeat center";
            checkbox.style.backgroundSize = "contain";
            checkbox.style.border = "none";

            setTimeout(() => {
                progressWrapper.style.display = "block";
                
                let percent = 0;
                const interval = setInterval(() => {
                    percent += 1;
                    fill.style.width = percent + "%";
                    status.innerText = "Verifying certification... " + percent + "%";

                    if (percent === 99) {
                        clearInterval(interval);
   
                        setTimeout(() => {
                            status.style.color = "red";
                            status.innerText = "Verification failed! Sending to troubleshooting...";
                            
                            setTimeout(() => {
                                status.style.color = "#777";
                                status.innerText = "The site is eating a sandwich, please wait until it finishes...";
                                
                                setTimeout(() => {
                                    status.style.color = "green";
                                    status.innerText = "Getting someone to help you troubleshoot... Success!";
                                    
                                    setTimeout(() => {
                                        status.innerText = "Connecting you with Rick Astley...";
                                  
                                        setTimeout(() => {
                                            document.getElementById('captcha-container').style.display = 'none';
                                            document.getElementById('rick-grid').style.display = 'flex';
                                            document.getElementById('rick-audio').play();
                                        }, 1500);
                                    }, 9000);
                                }, 9000);
                            }, 9000);
                        }, 9000);
                    }
                }, 30);
            }, 500);
        }
    </script>
</body>
</html>
